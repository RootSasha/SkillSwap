version: '3.8'

services:
  skillswap_db:
    image: postgres:15-alpine
    container_name: skillswap_postgres
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - skillswap_network

  skillswap_backend:
    build: .
    container_name: skillswap_api
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=skillswap_db
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@skillswap_db:5432/${POSTGRES_DB}
    depends_on:
      - skillswap_db
    networks:
      - skillswap_network

volumes:
  postgres_data:

networks:
  skillswap_network:
    driver: bridge
