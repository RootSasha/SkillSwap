# =============================================================================
# nginx.conf — production-конфіг для SkillSwap фронтенду
# =============================================================================
# Замінює роль Vite dev-server proxy (server.proxy в vite.config.ts),
# який працює ТІЛЬКИ під час `npm run dev` і не призначений для проду.
#
# Тут Nginx робить дві речі:
#   1. Віддає статичні файли React-збірки (dist/) — SPA-фолбек на index.html,
#      щоб прямі переходи на /profile, /matches тощо не давали 404.
#   2. Проксує всі запити /api/* на backend-контейнер (skillswap_api:8000) —
#      той самий принцип, що й Vite-проксі, але для production.
#
# Завдяки цьому фронтенд і бекенд лишаються на одному origin з точки зору
# браузера — CORS не потрібен взагалі, mixed content неможливий (все за
# одним https, який термінує SSL-сертифікат тут же або на рівні reverse
# proxy перед цим контейнером).
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Проксі для API ───────────────────────────────────────────────────────
    # skillswap_api — це назва backend-контейнера з docker-compose.yml,
    # Docker сам резолвить її в IP всередині спільної мережі
    # skillswap_network. Порт 8000 — той самий, що в EXPOSE Dockerfile backend.
    location /api/ {
        proxy_pass http://skillswap_api:8000/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # X-Telegram-Init-Data — кастомний заголовок з автентифікацією,
        # Nginx за замовчуванням пропускає всі заголовки клієнта далі,
        # але прописуємо явно про всяк випадок при майбутніх змінах конфігу.
        proxy_pass_request_headers on;

        # Таймаути трохи більші за дефолтні — на випадок повільних
        # запитів до БД під навантаженням
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Якщо юзер відкриває напряму /profile або /matches (а не лише /),
    # на диску такого файлу немає — віддаємо index.html, а React Router
    # (якщо буде доданий) або сам стан застосунку розбереться, який екран
    # показати. Без цього — 404 при прямому переході/перезавантаженні сторінки.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Кешування статичних ассетів ──────────────────────────────────────────
    # Vite додає хеш у назву файлу при кожній збірці (наприклад
    # index-a1b2c3.js), тож агресивне кешування безпечне — нова збірка
    # завжди матиме нову назву файлу.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
